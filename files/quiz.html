<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — K-Phonics Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --red:#FF4B5C; --blue:#2D7DD2; --green:#06D6A0;
  --yellow:#FFD166; --purple:#9B5DE5;
  --bg:#FFF8F0; --card:#FFFFFF; --text:#1A1A2E; --muted:#9A9AB0;
  --radius:20px; --shadow:0 8px 30px rgba(0,0,0,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg); min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:0 16px 60px;
}

/* ── TOP BAR ── */
.topbar{
  width:100%; max-width:520px;
  display:flex; align-items:center; gap:12px;
  padding:16px 0 20px;
}
.back-btn{
  width:40px;height:40px;border-radius:12px;
  background:white; border:none; cursor:pointer;
  font-size:1.1rem; box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.quiz-title{
  font-family:'Baloo 2',cursive; font-size:1.2rem;
  font-weight:800; color:var(--text); flex:1;
}
.score-badge{
  background:var(--purple); color:white;
  font-size:0.8rem; font-weight:800;
  padding:6px 14px; border-radius:50px;
}

/* ── PROGRESS ── */
.progress-wrap{
  width:100%; max-width:520px;
  margin-bottom:20px;
}
.progress-bar-bg{
  height:10px; background:#e5e7eb;
  border-radius:5px; overflow:hidden;
}
.progress-bar-fill{
  height:100%; background:linear-gradient(90deg,var(--purple),var(--blue));
  border-radius:5px; transition:width 0.5s ease;
}
.progress-info{
  display:flex; justify-content:space-between;
  font-size:0.78rem; font-weight:700;
  color:var(--muted); margin-top:6px;
}

/* ── STAGE TABS ── */
.stage-tabs{
  display:flex; gap:8px; margin-bottom:20px;
  width:100%; max-width:520px;
}
.stage-tab{
  flex:1; padding:10px 0; border-radius:14px;
  border:2px solid #e5e7eb; background:white;
  font-family:'Nunito',sans-serif; font-weight:800;
  font-size:0.82rem; color:var(--muted); cursor:pointer;
  transition:all 0.2s;
}
.stage-tab.active{
  border-color:var(--purple); background:var(--purple);
  color:white; box-shadow:0 4px 15px rgba(155,93,229,0.3);
}

/* ── QUESTION CARD ── */
.q-card{
  width:100%; max-width:520px;
  background:var(--card); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:28px 24px 24px;
  margin-bottom:16px;
  animation:slideUp 0.35s ease;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

.q-type-badge{
  display:inline-block;
  font-size:0.7rem; font-weight:800;
  letter-spacing:1px; text-transform:uppercase;
  padding:4px 12px; border-radius:50px;
  background:rgba(155,93,229,0.1); color:var(--purple);
  margin-bottom:14px;
}

.q-text{
  font-family:'Baloo 2',cursive; font-size:1.4rem;
  font-weight:800; color:var(--text);
  line-height:1.3; margin-bottom:6px;
}
.q-sub{
  font-size:0.85rem; font-weight:600;
  color:var(--muted); margin-bottom:20px;
}

/* listen button */
.listen-btn{
  display:flex; align-items:center; gap:10px;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  color:white; border:none; border-radius:16px;
  padding:14px 24px; font-family:'Nunito',sans-serif;
  font-size:1rem; font-weight:800; cursor:pointer;
  margin-bottom:24px; transition:all 0.2s;
  box-shadow:0 6px 20px rgba(155,93,229,0.35);
}
.listen-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(155,93,229,0.4);}
.listen-btn.playing{animation:pulse 0.6s infinite alternate;}
@keyframes pulse{from{box-shadow:0 6px 20px rgba(155,93,229,0.35);}to{box-shadow:0 6px 30px rgba(155,93,229,0.7);}}

.sound-bars{display:flex;align-items:center;gap:3px;height:20px;}
.sbar{width:3px;border-radius:2px;background:white;}
.listen-btn.playing .sbar{animation:wv 0.5s ease-in-out infinite alternate;}
.sbar:nth-child(1){height:6px;animation-delay:0s;}
.sbar:nth-child(2){height:14px;animation-delay:0.1s;}
.sbar:nth-child(3){height:20px;animation-delay:0.2s;}
.sbar:nth-child(4){height:14px;animation-delay:0.1s;}
.sbar:nth-child(5){height:6px;animation-delay:0s;}
@keyframes wv{from{transform:scaleY(0.3);}to{transform:scaleY(1);}}

/* ── OPTIONS ── */
.options-grid{
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; width:100%; max-width:520px;
}
.opt-btn{
  background:white; border:2px solid #e5e7eb;
  border-radius:16px; padding:22px 12px;
  cursor:pointer; text-align:center;
  transition:all 0.18s;
  -webkit-tap-highlight-color:transparent;
  position:relative; overflow:hidden;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:8px;
}
.opt-btn:hover{border-color:var(--purple);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.08);}
.opt-emoji{font-size:2rem;display:block;margin-bottom:6px;}
.opt-word{
  font-family:'Baloo 2',cursive; font-size:1.4rem;
  font-weight:800; color:var(--text);
}
.opt-letters{
  display:flex;justify-content:center;gap:3px;margin-top:6px;
}
.ol{
  width:26px;height:30px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Baloo 2',cursive;font-size:1rem;font-weight:700;color:white;
}
.ol.c{background:#4A4E69;}
.ol.va{background:var(--red);}
.ol.ve{background:var(--blue);}
.ol.vi{background:var(--green);}
.ol.vo{background:var(--yellow);color:var(--text);}
.ol.vu{background:var(--purple);}

/* result states */
.opt-btn.correct{
  border-color:var(--green);background:rgba(6,214,160,0.08);
  animation:correctPop 0.4s ease;
}
.opt-btn.wrong{
  border-color:var(--red);background:rgba(255,75,92,0.08);
  animation:shake 0.4s ease;
}
@keyframes correctPop{
  0%{transform:scale(1);}50%{transform:scale(1.06);}100%{transform:scale(1);}
}
@keyframes shake{
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-6px);}75%{transform:translateX(6px);}
}
.opt-btn.correct .opt-word{color:var(--green);}
.opt-btn.wrong .opt-word{color:var(--red);}

/* ── FEEDBACK ── */
.feedback{
  width:100%;max-width:520px;
  background:white;border-radius:18px;
  padding:16px 20px;margin-bottom:16px;
  display:none;align-items:center;gap:14px;
  box-shadow:var(--shadow);
  animation:slideUp 0.3s ease;
}
.feedback.show{display:flex;}
.feedback.correct-fb{border-left:5px solid var(--green);}
.feedback.wrong-fb{border-left:5px solid var(--red);}
.fb-emoji{font-size:2rem;flex-shrink:0;}
.fb-text h4{font-size:0.95rem;font-weight:800;color:var(--text);margin-bottom:2px;}
.fb-text p{font-size:0.82rem;font-weight:600;color:var(--muted);}
.next-btn{
  margin-left:auto; background:var(--purple);color:white;
  border:none;border-radius:12px;padding:10px 18px;
  font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:800;
  cursor:pointer;white-space:nowrap;transition:all 0.2s;
}
.next-btn:hover{background:#7c3aed;}

/* ── RESULT SCREEN ── */
.result-screen{
  width:100%;max-width:520px;
  background:white;border-radius:var(--radius);
  box-shadow:var(--shadow);padding:40px 24px;
  text-align:center;display:none;
  animation:slideUp 0.4s ease;
}
.result-screen.show{display:block;}
.result-emoji{font-size:4rem;margin-bottom:12px;}
.result-title{
  font-family:'Baloo 2',cursive;font-size:1.8rem;
  font-weight:900;color:var(--text);margin-bottom:6px;
}
.result-score{
  font-size:3rem;font-weight:900;
  font-family:'Baloo 2',cursive;
  margin:16px 0;
}
.result-msg{font-size:0.9rem;font-weight:600;color:var(--muted);margin-bottom:24px;}
.result-btns{display:flex;gap:12px;justify-content:center;}
.retry-btn{
  background:var(--purple);color:white;border:none;
  border-radius:14px;padding:14px 28px;
  font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:800;
  cursor:pointer;transition:all 0.2s;
}
.retry-btn:hover{background:#7c3aed;transform:translateY(-2px);}
.home-btn{
  background:white;color:var(--text);
  border:2px solid #e5e7eb;border-radius:14px;
  padding:14px 28px;font-family:'Nunito',sans-serif;
  font-size:0.9rem;font-weight:800;cursor:pointer;
  transition:all 0.2s;
}
.home-btn:hover{border-color:var(--purple);color:var(--purple);}

/* saving indicator */
.saving{
  position:fixed;bottom:20px;right:20px;
  background:#1A1A2E;color:white;
  padding:10px 18px;border-radius:12px;
  font-size:0.82rem;font-weight:700;
  display:none;z-index:999;
  animation:slideUp 0.3s ease;
}
.saving.show{display:block;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="back-btn" onclick="location.href='index.html'">←</button>
  <div class="quiz-title">🎯 Quiz</div>
  <div class="score-badge" id="scoreBadge">0 / 0</div>
</div>

<!-- STAGE TABS -->
<div class="stage-tabs">
  <button class="stage-tab active" onclick="setStage(1,this)">1단계 CVC</button>
  <button class="stage-tab" onclick="setStage(2,this)">2단계 블렌드</button>
  <button class="stage-tab" onclick="setStage(3,this)">사이트워드</button>
</div>

<!-- PROGRESS -->
<div class="progress-wrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-info">
    <span id="qNum">문제 1 / 10</span>
    <span id="timeEl">⏱ 0초</span>
  </div>
</div>

<!-- QUESTION CARD -->
<div class="q-card" id="qCard">
  <div class="q-type-badge" id="qBadge">소리 듣고 고르기</div>
  <div class="q-text" id="qText">준비 중...</div>
  <div class="q-sub" id="qSub">아래 버튼을 눌러 소리를 들어보세요</div>
  <button class="listen-btn" id="listenBtn" onclick="playQuestion()">
    <div class="sound-bars">
      <div class="sbar"></div><div class="sbar"></div><div class="sbar"></div>
      <div class="sbar"></div><div class="sbar"></div>
    </div>
    <span>듣기 🔊</span>
  </button>
</div>

<!-- OPTIONS -->
<div class="options-grid" id="optionsGrid"></div>

<!-- FEEDBACK -->
<div class="feedback" id="feedback">
  <div class="fb-emoji" id="fbEmoji">🎉</div>
  <div class="fb-text">
    <h4 id="fbTitle">정답!</h4>
    <p id="fbMsg">잘했어요!</p>
  </div>
  <button class="next-btn" onclick="nextQuestion()">다음 →</button>
</div>

<!-- RESULT -->
<div class="result-screen" id="resultScreen">
  <div class="result-emoji" id="resultEmoji">🏆</div>
  <div class="result-title" id="resultTitle">Quiz 완료!</div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-msg" id="resultMsg"></div>
  <div class="result-btns">
    <button class="retry-btn" onclick="startQuiz()">다시 풀기 🔄</button>
    <button class="home-btn" onclick="location.href='index.html'">허브로 🏠</button>
  </div>
</div>

<div class="saving" id="saving">📊 저장 중...</div>

<script>
// ════════════════════════════════
// GOOGLE SHEETS ENDPOINT
// Apps Script 배포 후 URL을 여기에 붙여넣으세요
// ════════════════════════════════
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzvnYZJyT99K5dket_5SjNZNuJoMoHhV0e6_1gGD3-4hzG1DBcTGeJYAyYz-8UqmcDM/exec';

// ════════════════════════════════
// QUIZ DATA
// ════════════════════════════════
const QUIZDATA = {
  1: [ // CVC 단모음 — 모든 보기가 실제 단어
    {type:'listen', word:'cat', emoji:'🐱', vowel:'a',
     options:[{w:'cat',e:'🐱',v:'a'},{w:'cot',e:'🪴',v:'o'},{w:'cut',e:'✂️',v:'u'},{w:'cap',e:'🧢',v:'a'}]},
    {type:'listen', word:'bed', emoji:'🛏️', vowel:'e',
     options:[{w:'bed',e:'🛏️',v:'e'},{w:'bad',e:'😠',v:'a'},{w:'bid',e:'💰',v:'i'},{w:'bud',e:'🌱',v:'u'}]},
    {type:'listen', word:'pig', emoji:'🐷', vowel:'i',
     options:[{w:'pig',e:'🐷',v:'i'},{w:'peg',e:'📌',v:'e'},{w:'pug',e:'🐶',v:'u'},{w:'pat',e:'🤚',v:'a'}]},
    {type:'listen', word:'dog', emoji:'🐶', vowel:'o',
     options:[{w:'dog',e:'🐶',v:'o'},{w:'dig',e:'⛏️',v:'i'},{w:'dug',e:'🕳️',v:'u'},{w:'den',e:'🏠',v:'e'}]},
    {type:'listen', word:'sun', emoji:'☀️', vowel:'u',
     options:[{w:'sun',e:'☀️',v:'u'},{w:'sin',e:'😈',v:'i'},{w:'son',e:'👦',v:'o'},{w:'sat',e:'🪑',v:'a'}]},
    {type:'listen', word:'hat', emoji:'🎩', vowel:'a',
     options:[{w:'hat',v:'a'},{w:'hit',v:'i'},{w:'hot',v:'o'},{w:'hut',v:'u'}]},
    {type:'listen', word:'hen', emoji:'🐔', vowel:'e',
     options:[{w:'hen',v:'e'},{w:'bin',v:'i'},{w:'mop',v:'o'},{w:'bug',v:'u'}]},
    {type:'listen', word:'six', emoji:'6️⃣', vowel:'i',
     options:[{w:'six',v:'i'},{w:'sat',v:'a'},{w:'sob',v:'o'},{w:'sub',v:'u'}]},
    {type:'listen', word:'box', emoji:'📦', vowel:'o',
     options:[{w:'box',v:'o'},{w:'bat',v:'a'},{w:'bit',v:'i'},{w:'bus',v:'u'}]},
    {type:'listen', word:'cup', emoji:'🥤', vowel:'u',
     options:[{w:'cup',v:'u'},{w:'cap',v:'a'},{w:'cop',v:'o'},{w:'set',v:'e'}]},
  ],
  2: [ // 블렌드 — 듣고 맞추기 통일
    {type:'listen', word:'flag', emoji:'🚩', vowel:'a',
     options:[{w:'flag',v:'a'},{w:'flat',v:'a'},{w:'flab',v:'a'},{w:'flap',v:'a'}]},
    {type:'listen', word:'clap', emoji:'👏', vowel:'a',
     options:[{w:'clap',v:'a'},{w:'clip',v:'i'},{w:'club',v:'u'},{w:'clop',v:'o'}]},
    {type:'listen', word:'step', emoji:'👣', vowel:'e',
     options:[{w:'step',v:'e'},{w:'stop',v:'o'},{w:'stem',v:'e'},{w:'slab',v:'a'}]},
    {type:'listen', word:'frog', emoji:'🐸', vowel:'o',
     options:[{w:'frog',v:'o'},{w:'from',v:'o'},{w:'drip',v:'i'},{w:'flab',v:'a'}]},
    {type:'listen', word:'drum', emoji:'🥁', vowel:'u',
     options:[{w:'drum',v:'u'},{w:'drag',v:'a'},{w:'drip',v:'i'},{w:'drop',v:'o'}]},
    {type:'listen', word:'slip', emoji:'🧼', vowel:'i',
     options:[{w:'slip',v:'i'},{w:'slap',v:'a'},{w:'slop',v:'o'},{w:'slug',v:'u'}]},
    {type:'listen', word:'plug', emoji:'🔌', vowel:'u',
     options:[{w:'plug',v:'u'},{w:'plan',v:'a'},{w:'plod',v:'o'},{w:'plop',v:'o'}]},
    {type:'listen', word:'grip', emoji:'🤜', vowel:'i',
     options:[{w:'grip',v:'i'},{w:'grab',v:'a'},{w:'grin',v:'i'},{w:'drop',v:'o'}]},
    {type:'listen', word:'crab', emoji:'🦀', vowel:'a',
     options:[{w:'crab',v:'a'},{w:'crib',v:'i'},{w:'crop',v:'o'},{w:'cram',v:'a'}]},
    {type:'listen', word:'drip', emoji:'💧', vowel:'i',
     options:[{w:'drip',v:'i'},{w:'drop',v:'o'},{w:'drag',v:'a'},{w:'drum',v:'u'}]},
  ],
  3: [ // 사이트워드 (문장 완성)
    {type:'sentence', sentence:'I ___ a student.', answer:'am', blank:'am',
     options:['am','is','are','be'], hint:'주어가 I일 때'},
    {type:'sentence', sentence:'She ___ my friend.', answer:'is', blank:'is',
     options:['am','is','are','were'], hint:'주어가 She/He/It일 때'},
    {type:'sentence', sentence:'We ___ happy.', answer:'are', blank:'are',
     options:['am','is','are','be'], hint:'주어가 We/You/They일 때'},
    {type:'sentence', sentence:'What ___ this?', answer:'is', blank:'is',
     options:['am','is','are','do'], hint:'의문문 What is this?'},
    {type:'sentence', sentence:'I ___ apples.', answer:'like', blank:'like',
     options:['like','likes','liked','liking'], hint:'I + 동사원형'},
    {type:'sentence', sentence:'Do you ___ a pencil?', answer:'have', blank:'have',
     options:['have','has','had','having'], hint:'Do you + 동사원형'},
    {type:'sentence', sentence:'___ you swim?', answer:'Can', blank:'Can',
     options:['Can','Do','Is','Are'], hint:'능력을 물어볼 때'},
    {type:'sentence', sentence:'How ___ cows?', answer:'many', blank:'many',
     options:['many','much','more','most'], hint:'셀 수 있는 명사 앞'},
    {type:'sentence', sentence:'It ___ big.', answer:'is', blank:'is',
     options:['am','is','are','be'], hint:'It + is'},
    {type:'sentence', sentence:'___ is my dad.', answer:'He', blank:'He',
     options:['He','She','It','They'], hint:'남자를 가리킬 때'},
  ]
};

// ════════════════════════════════
// STATE
// ════════════════════════════════
let stage = 1;
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let startTime = Date.now();
let qStartTime = Date.now();
let timerInterval;
let studentName = localStorage.getItem('kphonics_name') || '학생';

// ════════════════════════════════
// INIT
// ════════════════════════════════
function setStage(n, btn) {
  stage = n;
  document.querySelectorAll('.stage-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  startQuiz();
}

function startQuiz() {
  // shuffle questions
  questions = [...QUIZDATA[stage]].sort(()=>Math.random()-0.5);
  current = 0; score = 0; answered = false;
  startTime = Date.now();
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('qCard').style.display = 'block';
  document.getElementById('optionsGrid').style.display = 'grid';
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);
  renderQuestion();
}

function updateTimer() {
  const sec = Math.floor((Date.now()-startTime)/1000);
  document.getElementById('timeEl').textContent = `⏱ ${sec}초`;
}

// ════════════════════════════════
// RENDER
// ════════════════════════════════
function renderQuestion() {
  answered = false;
  qStartTime = Date.now();
  const q = questions[current];
  const total = questions.length;

  // progress
  document.getElementById('progressFill').style.width = (current/total*100)+'%';
  document.getElementById('qNum').textContent = `문제 ${current+1} / ${total}`;
  document.getElementById('scoreBadge').textContent = `${score} / ${current}`;

  // hide feedback
  const fb = document.getElementById('feedback');
  fb.classList.remove('show','correct-fb','wrong-fb');

  // re-animate card
  const card = document.getElementById('qCard');
  card.style.animation='none'; card.offsetHeight;
  card.style.animation='slideUp 0.35s ease';

  if(q.type === 'sentence') {
    renderSentenceQ(q);
  } else {
    renderWordQ(q);
  }
}

function renderWordQ(q) {
  document.getElementById('qBadge').textContent = '🔊 소리 듣고 고르기';
  document.getElementById('listenBtn').style.display = 'flex';
  document.getElementById('qText').textContent = '🔊 어떤 단어일까요?';
  document.getElementById('qSub').textContent = '듣기 버튼을 눌러 소리를 들어보세요';

  // build options
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = '1fr 1fr';

  const shuffled = [...q.options].sort(()=>Math.random()-0.5);
  shuffled.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    const letters = opt.w.split('').map(l=>{
      const isV = l===opt.v;
      return `<div class="ol ${isV?'v'+opt.v:'c'}">${l}</div>`;
    }).join('');
    btn.innerHTML = `
      <div class="opt-word">${opt.w}</div>
      <div class="opt-letters">${letters}</div>
    `;
    btn.onclick = () => checkAnswer(opt.w === q.word, btn, q);
    grid.appendChild(btn);
  });
}

function renderSentenceQ(q) {
  document.getElementById('qBadge').textContent = '✏️ 빈칸 채우기';
  document.getElementById('listenBtn').style.display = 'none';
  document.getElementById('qText').textContent = q.sentence;
  document.getElementById('qSub').textContent = `힌트: ${q.hint}`;

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = '1fr 1fr';

  const shuffled = [...q.options].sort(()=>Math.random()-0.5);
  shuffled.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<div class="opt-word" style="font-size:1.3rem">${opt}</div>`;
    btn.onclick = () => checkAnswer(opt === q.answer, btn, q);
    grid.appendChild(btn);
  });
}

// ════════════════════════════════
// AUDIO
// ════════════════════════════════
const synth = window.speechSynthesis;
function getVoice(){
  const v=synth.getVoices();
  return v.find(x=>x.lang.startsWith('en-US'))
    ||v.find(x=>x.lang.startsWith('en-GB'))
    ||v.find(x=>x.lang.startsWith('en'))||null;
}

function playQuestion() {
  const q = questions[current];
  if(!q||q.type==='sentence') return;
  const btn = document.getElementById('listenBtn');
  synth.cancel();
  btn.classList.add('playing');

  // 단어 통째로 1번
  const u1 = new SpeechSynthesisUtterance(q.word);
  u1.rate=0.8; u1.pitch=1.0;
  const v=getVoice(); if(v) u1.voice=v;
  synth.speak(u1);

  // 0.8초 후 한 번 더
  setTimeout(()=>{
    const u2 = new SpeechSynthesisUtterance(q.word);
    u2.rate=0.8; u2.pitch=1.0;
    const v2=getVoice(); if(v2) u2.voice=v2;
    u2.onend = ()=>btn.classList.remove('playing');
    synth.speak(u2);
  }, 800);
}

if(speechSynthesis.onvoiceschanged!==undefined)
  speechSynthesis.onvoiceschanged=()=>{};

// ════════════════════════════════
// CHECK ANSWER
// ════════════════════════════════
function checkAnswer(isCorrect, btn, q) {
  if(answered) return;
  answered = true;
  const qTime = Math.round((Date.now()-qStartTime)/1000);

  // visual feedback
  btn.classList.add(isCorrect?'correct':'wrong');
  if(isCorrect) {
    score++;
    showFeedback(true, q);
  } else {
    // show correct answer
    const allBtns = document.querySelectorAll('.opt-btn');
    allBtns.forEach(b=>{
      const word = b.querySelector('.opt-word')?.textContent;
      const correctWord = q.type==='sentence' ? q.answer : q.word;
      if(word===correctWord) b.classList.add('correct');
    });
    showFeedback(false, q);
  }

  // disable all buttons
  document.querySelectorAll('.opt-btn').forEach(b=>b.style.pointerEvents='none');

  // save to sheet
  saveToSheet({
    name: studentName,
    stage: stage,
    question: q.type==='sentence' ? q.sentence : q.word,
    correct: isCorrect,
    time: qTime
  });
}

function showFeedback(isCorrect, q) {
  const fb = document.getElementById('feedback');
  const msgs = isCorrect
    ? ['🎉 정답! 잘했어요!','⭐ 완벽해요!','🏆 대단해요!','🌟 훌륭해요!']
    : ['💪 아쉽지만 괜찮아요!','🔄 다시 해봐요!','😊 조금만 더!'];
  const msg = msgs[Math.floor(Math.random()*msgs.length)];

  document.getElementById('fbEmoji').textContent = isCorrect ? '🎉' : '💪';
  document.getElementById('fbTitle').textContent = isCorrect ? '정답!' : '아쉬워요';
  document.getElementById('fbMsg').textContent = msg;
  fb.className = 'feedback show '+(isCorrect?'correct-fb':'wrong-fb');
}

function nextQuestion() {
  current++;
  if(current >= questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ════════════════════════════════
// RESULT
// ════════════════════════════════
function showResult() {
  clearInterval(timerInterval);
  document.getElementById('qCard').style.display = 'none';
  document.getElementById('optionsGrid').style.display = 'none';
  document.getElementById('feedback').classList.remove('show');

  const pct = Math.round(score/questions.length*100);
  const screen = document.getElementById('resultScreen');
  screen.classList.add('show');

  let emoji='🏆', title='훌륭해요!', msg='';
  if(pct>=90){emoji='🥇';title='완벽해요!';msg='파닉스 히어로 등극! 🦸';}
  else if(pct>=70){emoji='🥈';title='잘했어요!';msg='조금만 더 연습하면 완벽해요!';}
  else if(pct>=50){emoji='🥉';title='괜찮아요!';msg='다시 한번 도전해봐요!';}
  else{emoji='💪';title='파이팅!';msg='연습하면 반드시 잘할 수 있어요!';}

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').innerHTML =
    `<span style="color:var(--purple)">${score}</span><span style="font-size:1.5rem;color:var(--muted)"> / ${questions.length}</span>`;
  document.getElementById('resultMsg').textContent = msg;

  // save final result
  saveToSheet({
    name: studentName,
    stage: stage,
    question: '최종결과',
    correct: null,
    time: Math.round((Date.now()-startTime)/1000),
    score: pct
  });

  // update localStorage progress
  localStorage.setItem(`kphonics_stage${stage}_pct`, pct);
}

// ════════════════════════════════
// GOOGLE SHEETS SAVE
// ════════════════════════════════
async function saveToSheet(data) {
  if(SHEET_URL === 'YOUR_APPS_SCRIPT_URL_HERE') return; // skip if not set
  const saving = document.getElementById('saving');
  saving.classList.add('show');
  try {
    await fetch(SHEET_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        timestamp: new Date().toLocaleString('ko-KR'),
        name: data.name,
        stage: `${data.stage}단계`,
        question: data.question,
        correct: data.correct===null ? '최종' : (data.correct?'O':'X'),
        time: data.time+'초',
        score: data.score ? data.score+'%' : ''
      })
    });
  } catch(e) { console.log('Sheet save error:', e); }
  setTimeout(()=>saving.classList.remove('show'), 1500);
}

// ════════════════════════════════
// START
// ════════════════════════════════
startQuiz();
</script>
