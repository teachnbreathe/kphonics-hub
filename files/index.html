<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Phonics Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#E8F4FD; --sky2:#D0EAFB;
  --red:#FF5757; --blue:#4A90E2; --green:#3DD68C;
  --yellow:#FFD166; --purple:#9B5DE5; --orange:#FF8C42;
  --card:#FFFFFF; --text:#2B2D42; --muted:#8D99AE;
  --radius:22px; --shadow:0 6px 24px rgba(43,45,66,0.10);
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Nunito',sans-serif;
  background: linear-gradient(180deg, #C8E8FA 0%, #E8F4FD 180px, #F5F8FF 100%);
  min-height:100vh;
  padding-bottom:60px;
  overflow-x:hidden;
}

/* ── HERO ── */
.hero {
  padding: 36px 20px 0;
  text-align:center;
  position:relative;
}

/* floating clouds */
.cloud {
  position:absolute;
  background:white;
  border-radius:50px;
  opacity:0.7;
}
.cloud::before, .cloud::after {
  content:''; position:absolute;
  background:white; border-radius:50%;
}
.cloud1 { width:80px;height:26px; top:30px; left:8%; animation:drift 8s ease-in-out infinite alternate; }
.cloud1::before { width:36px;height:36px; top:-18px; left:12px; }
.cloud1::after  { width:26px;height:26px; top:-12px; left:36px; }
.cloud2 { width:60px;height:20px; top:55px; right:10%; animation:drift 11s ease-in-out infinite alternate-reverse; }
.cloud2::before { width:28px;height:28px; top:-14px; left:10px; }
.cloud2::after  { width:20px;height:20px; top:-10px; left:28px; }
@keyframes drift { from{transform:translateX(0)} to{transform:translateX(12px)} }

.brand-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:white;
  border:2px solid rgba(74,144,226,0.25);
  color:var(--blue);
  font-size:0.72rem; font-weight:900;
  letter-spacing:2px; text-transform:uppercase;
  padding:5px 14px; border-radius:50px;
  margin-bottom:14px;
  box-shadow:0 2px 10px rgba(74,144,226,0.15);
}
.brand-badge::before { content:'⭐'; font-size:0.8rem; }

.hero h1 {
  font-family:'Baloo 2',cursive;
  font-size:clamp(2rem, 8vw, 3rem);
  font-weight:900; color:var(--text);
  line-height:1.05; margin-bottom:6px;
}
.hero h1 .accent {
  color:var(--blue);
}

.hero-sub {
  color:var(--muted);
  font-size:0.9rem; font-weight:700;
  margin-bottom:24px;
}

/* ── VOWEL HEROES ── */
.vowel-heroes {
  display:flex; justify-content:center; gap:10px;
  margin-bottom:-30px;
  position:relative; z-index:2;
}
.vhero {
  display:flex; flex-direction:column; align-items:center;
  gap:4px; cursor:default;
  animation: bounceIn 0.5s cubic-bezier(.68,-.55,.27,1.55) both;
}
.vhero:nth-child(1){animation-delay:0.05s}
.vhero:nth-child(2){animation-delay:0.10s}
.vhero:nth-child(3){animation-delay:0.15s}
.vhero:nth-child(4){animation-delay:0.20s}
.vhero:nth-child(5){animation-delay:0.25s}
@keyframes bounceIn {
  from{opacity:0;transform:scale(0.4) translateY(20px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.vhero-face {
  width:54px; height:54px; border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Baloo 2',cursive; font-size:1.6rem; font-weight:900;
  color:white;
  box-shadow:0 6px 18px rgba(0,0,0,0.18);
  position:relative;
  transition:transform 0.2s cubic-bezier(.68,-.55,.27,1.55);
}
.vhero-face:hover { transform:scale(1.15) rotate(-5deg); }

/* 각 모음 캐릭터 색 */
.vhero:nth-child(1) .vhero-face { background:linear-gradient(145deg,#FF7043,#FF5757); }
.vhero:nth-child(2) .vhero-face { background:linear-gradient(145deg,#4A90E2,#2D7DD2); }
.vhero:nth-child(3) .vhero-face { background:linear-gradient(145deg,#3DD68C,#22B572); }
.vhero:nth-child(4) .vhero-face { background:linear-gradient(145deg,#FFD166,#FFC107); }
.vhero:nth-child(5) .vhero-face { background:linear-gradient(145deg,#9B5DE5,#7C3AED); }

/* 귀 장식 */
.vhero-face::before, .vhero-face::after {
  content:''; position:absolute;
  width:12px; height:12px; border-radius:50%;
  top:-4px;
}
.vhero:nth-child(1) .vhero-face::before { background:#FF5757; left:8px; }
.vhero:nth-child(1) .vhero-face::after  { background:#FF5757; right:8px; }
.vhero:nth-child(2) .vhero-face::before { background:#2D7DD2; left:8px; }
.vhero:nth-child(2) .vhero-face::after  { background:#2D7DD2; right:8px; }
.vhero:nth-child(3) .vhero-face::before { background:#22B572; left:8px; }
.vhero:nth-child(3) .vhero-face::after  { background:#22B572; right:8px; }
.vhero:nth-child(4) .vhero-face::before { background:#FFC107; left:8px; }
.vhero:nth-child(4) .vhero-face::after  { background:#FFC107; right:8px; }
.vhero:nth-child(5) .vhero-face::before { background:#7C3AED; left:8px; }
.vhero:nth-child(5) .vhero-face::after  { background:#7C3AED; right:8px; }

.vhero-label {
  font-size:0.65rem; font-weight:800; color:var(--muted);
  letter-spacing:0.5px;
}

/* ── WHITE WAVE DIVIDER ── */
.wave-divider {
  width:100%; height:60px; margin-top:0;
  display:block;
}

/* ── NAME INPUT ── */
.name-section {
  max-width:480px; margin:0 auto 28px;
  padding:0 20px;
}
.name-card {
  background:white;
  border-radius:20px;
  padding:16px 20px;
  box-shadow:0 8px 30px rgba(74,144,226,0.14);
  display:flex; align-items:center; gap:12px;
  border:2px solid rgba(74,144,226,0.10);
}
.name-card .avatar {
  width:44px; height:44px; border-radius:14px;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem; flex-shrink:0;
}
.name-card input {
  flex:1; border:none; outline:none;
  font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700;
  color:var(--text); background:transparent;
}
.name-card input::placeholder { color:var(--muted); font-weight:600; }
.name-card .confirm-btn {
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:white; border:none; border-radius:14px;
  padding:10px 18px; font-family:'Nunito',sans-serif;
  font-size:0.85rem; font-weight:800; cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
  box-shadow:0 4px 12px rgba(74,144,226,0.35);
}
.name-card .confirm-btn:active { transform:scale(0.96); }
.name-card .confirm-btn.saved { background:linear-gradient(135deg,var(--green),#22B572); pointer-events:none; }

.greeting {
  text-align:center; margin-top:10px;
  font-size:0.88rem; font-weight:800; color:var(--blue);
  min-height:22px;
}

/* ── SECTION LABEL ── */
.section-label {
  max-width:660px; margin:0 auto 12px;
  padding:0 20px;
  display:flex; align-items:center; gap:10px;
}
.section-label h2 {
  font-family:'Baloo 2',cursive; font-size:1rem;
  font-weight:800; color:var(--text); white-space:nowrap;
}
.section-label .line {
  flex:1; height:2px;
  background:linear-gradient(to right,#e2e8f0,transparent);
  border-radius:2px;
}

/* ── MENU GRID ── */
.menu-grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  max-width:660px; margin:0 auto 32px;
  padding:0 20px;
}

.menu-card {
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:0;
  cursor:pointer; text-decoration:none;
  display:flex; flex-direction:column;
  align-items:center; text-align:center;
  position:relative; overflow:hidden;
  transition:transform 0.18s, box-shadow 0.18s;
  -webkit-tap-highlight-color:transparent;
  border:2px solid transparent;
}
.menu-card:active { transform:scale(0.96); }

/* 카드 상단 컬러 블록 — 일러스트 영역 */
.menu-card-top {
  width:100%; padding:22px 16px 16px;
  display:flex; align-items:center; justify-content:center;
  border-radius:20px 20px 0 0;
  position:relative; overflow:hidden;
}

/* 카드마다 고유 색 */
.menu-card.flashcard .menu-card-top { background:linear-gradient(145deg,#FFF0EB,#FFE0D6); }
.menu-card.quiz      .menu-card-top { background:linear-gradient(145deg,#EAF0FF,#D8E6FF); }
.menu-card.minibook  .menu-card-top { background:linear-gradient(145deg,#E6FBF2,#D0F5E6); }
.menu-card.sightword .menu-card-top { background:linear-gradient(145deg,#FFFBE6,#FFF4C2); }

.menu-card.flashcard { border-color:rgba(255,87,87,0.12); }
.menu-card.quiz      { border-color:rgba(74,144,226,0.12); }
.menu-card.minibook  { border-color:rgba(61,214,140,0.12); }
.menu-card.sightword { border-color:rgba(255,193,7,0.15); }

/* SVG 아이콘 래퍼 */
.menu-illust {
  width:64px; height:64px;
  transition:transform 0.3s cubic-bezier(.68,-.55,.27,1.55);
}
.menu-card:hover .menu-illust,
.menu-card:active .menu-illust { transform:scale(1.12) rotate(-6deg); }

/* 카드 하단 텍스트 */
.menu-card-body {
  padding:12px 14px 16px; width:100%;
}
.menu-title {
  font-family:'Baloo 2',cursive; font-size:1rem;
  font-weight:800; color:var(--text); margin-bottom:3px;
}
.menu-desc {
  font-size:0.73rem; font-weight:600;
  color:var(--muted); line-height:1.4;
}

.menu-badge {
  position:absolute; top:10px; right:10px;
  font-size:0.6rem; font-weight:900;
  padding:3px 9px; border-radius:50px;
  letter-spacing:0.5px;
}
.menu-badge.done { background:#E6FBF2; color:#22B572; }
.menu-badge.new  { background:#FFF0EB; color:var(--red); }

.lock-icon { position:absolute; top:10px; right:10px; font-size:0.95rem; }

.menu-card.locked { opacity:0.45; pointer-events:none; filter:grayscale(0.2); }

/* ── TEACHER CARD ── */
.teacher-card {
  max-width:660px; margin:0 auto 28px;
  padding:0 20px;
}
.teacher-inner {
  background:linear-gradient(135deg,var(--blue),var(--purple));
  border-radius:var(--radius);
  padding:18px 22px;
  display:flex; align-items:center; gap:14px;
  cursor:pointer; text-decoration:none;
  transition:transform 0.18s, box-shadow 0.18s;
  box-shadow:0 8px 28px rgba(74,144,226,0.28);
}
.teacher-inner:active { transform:scale(0.97); }
.teacher-emoji { font-size:2rem; }
.teacher-text { flex:1; }
.teacher-text h3 {
  font-family:'Baloo 2',cursive; font-size:0.95rem;
  font-weight:800; color:white; margin-bottom:1px;
}
.teacher-text p { font-size:0.75rem; font-weight:600; color:rgba(255,255,255,0.7); }
.teacher-arrow { color:rgba(255,255,255,0.5); font-size:1.3rem; font-weight:700; }

/* ── ROADMAP ── */
.roadmap-section {
  max-width:660px; margin:0 auto 32px;
  padding:0 20px;
}
.roadmap-card {
  background:white; border-radius:var(--radius);
  padding:22px 20px;
  box-shadow:var(--shadow);
}
.roadmap-card h3 {
  font-family:'Baloo 2',cursive; font-size:0.95rem;
  font-weight:800; color:var(--text); margin-bottom:18px;
}

.road-track {
  display:flex; flex-direction:column; gap:0;
  position:relative;
}
/* 세로 점선 연결선 */
.road-track::before {
  content:''; position:absolute;
  left:21px; top:36px; bottom:36px; width:2px;
  background:repeating-linear-gradient(
    180deg, #e2e8f0 0px, #e2e8f0 6px, transparent 6px, transparent 12px
  );
  z-index:0;
}

.road-stop {
  display:flex; align-items:center; gap:14px;
  padding:10px 0; position:relative; z-index:1;
}
.road-node {
  width:44px; height:44px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.3rem; flex-shrink:0;
  box-shadow:0 4px 14px rgba(0,0,0,0.12);
  position:relative;
}
.road-node.done    { background:linear-gradient(135deg,var(--green),#22B572); }
.road-node.active  { background:linear-gradient(135deg,var(--purple),var(--blue)); animation:glow 2.5s ease-in-out infinite; }
.road-node.locked  { background:#F0F2F8; box-shadow:none; }
@keyframes glow {
  0%,100%{ box-shadow:0 4px 14px rgba(155,93,229,0.3); }
  50%{ box-shadow:0 4px 22px rgba(155,93,229,0.65); }
}

.road-info { flex:1; }
.road-name {
  font-size:0.82rem; font-weight:800; color:var(--text); margin-bottom:6px;
}
.road-name.locked-text { color:var(--muted); }

.road-bar-bg {
  height:10px; background:#F0F2F8;
  border-radius:10px; overflow:hidden;
}
.road-bar-fill {
  height:100%; border-radius:10px;
  transition:width 1.2s cubic-bezier(0.34,1.56,0.64,1);
}
.road-bar-fill.done   { background:linear-gradient(90deg,var(--green),#22B572); width:100%; }
.road-bar-fill.active { background:linear-gradient(90deg,var(--purple),var(--blue)); }
.road-bar-fill.locked { width:0; }

.road-pct {
  font-size:0.72rem; font-weight:800; min-width:30px; text-align:right;
}
.road-pct.done   { color:var(--green); }
.road-pct.active { color:var(--purple); }
.road-pct.locked { color:var(--muted); }

/* footer */
footer {
  text-align:center; padding:20px;
  font-size:0.72rem; font-weight:700; color:var(--muted);
}
</style>
</head>

<script>
/* ── SVG 아이콘 일러스트 정의 ── */
const ICONS = {
  flashcard: `<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="8" y="14" width="40" height="28" rx="7" fill="#FF8A70"/>
    <rect x="12" y="18" width="40" height="28" rx="7" fill="#FF5757" opacity="0.9"/>

      font-family="Baloo 2,cursive" font-size="16" font-weight="900" fill="#FF5757">A</text>
    <circle cx="48" cy="14" r="8" fill="#FFD166"/>
    <text x="48" y="14" dominant-baseline="middle" text-anchor="middle"
      font-family="Nunito,sans-serif" font-size="9" font-weight="900" fill="#2B2D42">▶</text>
  </svg>`,

  quiz: `<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="32" cy="32" r="22" fill="#EAF0FF"/>
    <circle cx="32" cy="32" r="22" fill="#4A90E2" opacity="0.15"/>
    <circle cx="32" cy="20" r="10" fill="#4A90E2"/>
    <text x="32" y="20" dominant-baseline="middle" text-anchor="middle"
      font-family="Baloo 2,cursive" font-size="13" font-weight="900" fill="white">?</text>
    <rect x="14" y="34" width="36" height="7" rx="3.5" fill="#4A90E2" opacity="0.25"/>
    <rect x="14" y="44" width="26" height="7" rx="3.5" fill="#4A90E2" opacity="0.25"/>
    <circle cx="46" cy="47" r="6" fill="#FFD166"/>
    <text x="46" y="47" dominant-baseline="middle" text-anchor="middle"
      font-family="Nunito" font-size="9" font-weight="900" fill="#2B2D42">★</text>
  </svg>`,

  minibook: `<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="14" width="22" height="30" rx="4" fill="#3DD68C"/>
    <rect x="32" y="14" width="22" height="30" rx="4" fill="#22B572"/>
    <rect x="13" y="17" width="16" height="2.5" rx="1.25" fill="white" opacity="0.6"/>
    <rect x="13" y="22" width="13" height="2.5" rx="1.25" fill="white" opacity="0.6"/>
    <rect x="13" y="27" width="14" height="2.5" rx="1.25" fill="white" opacity="0.6"/>
    <rect x="35" y="17" width="16" height="2.5" rx="1.25" fill="white" opacity="0.6"/>
    <rect x="35" y="22" width="13" height="2.5" rx="1.25" fill="white" opacity="0.6"/>
    <line x1="32" y1="14" x2="32" y2="44" stroke="#1A9660" stroke-width="2"/>
    <circle cx="50" cy="14" r="7" fill="#FFD166"/>
    <text x="50" y="14" dominant-baseline="middle" text-anchor="middle"
      font-family="Nunito" font-size="9" font-weight="900" fill="#2B2D42">📖</text>
  </svg>`,

  sightword: `<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="32" cy="32" r="20" fill="#FFE082"/>
    <polygon points="32,12 35,26 50,26 38,35 42,50 32,41 22,50 26,35 14,26 29,26"
      fill="#FFD166" stroke="#FFC107" stroke-width="1.5"/>
    <text x="32" y="33" dominant-baseline="middle" text-anchor="middle"
      font-family="Baloo 2,cursive" font-size="11" font-weight="900" fill="#2B2D42">the</text>
  </svg>`
};

/* ── 메뉴 데이터 ── */
const MENU_ITEMS = [
  {key:'flashcard', cls:'flashcard', title:'Flash Cards',
   desc:'단모음 5개<br>소리를 들어봐요', href:'flashcard.html', badge:'완성', badgeCls:'done'},
  {key:'quiz',      cls:'quiz',      title:'Quiz',
   desc:'내 실력을<br>확인해봐요',      href:'quiz.html',      badge:'NEW',  badgeCls:'new'},
  {key:'minibook',  cls:'minibook',  title:'Mini Books',
   desc:'그림 보며<br>문장을 읽어요',   href:'minibook.html',  badge:'NEW',  badgeCls:'new'},
  {key:'sightword', cls:'sightword', title:'Sight Words',
   desc:'자주 쓰는 단어<br>눈으로 익혀요',href:'sightwords.html',badge:'NEW', badgeCls:'new'},
];

function renderMenus(){
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  MENU_ITEMS.forEach(m => {
    const enabled = localStorage.getItem('menu_'+m.key);
    const isEnabled = enabled === null ? true : enabled === 'true';
    const card = document.createElement(isEnabled ? 'a' : 'div');
    card.className = `menu-card ${m.cls}${isEnabled ? '' : ' locked'}`;
    if(isEnabled) card.href = m.href;
    card.innerHTML = `
      <div class="menu-card-top">
        ${isEnabled
          ? `<div class="menu-badge ${m.badgeCls}">${m.badge}</div>`
          : `<div class="lock-icon">🔒</div>`}
        <div class="menu-illust">${ICONS[m.cls]}</div>
      </div>
      <div class="menu-card-body">
        <div class="menu-title">${m.title}</div>
        <div class="menu-desc">${isEnabled ? m.desc : '선생님이 잠금 설정했어요'}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}

/* ── 이름 저장 ── */
const greetings = ['안녕하세요 🎉','Hello! 👋','Hi there! ✨','멋진데요 🌟','파닉스 히어로 🦸'];
function saveName(){
  const name = document.getElementById('nameInput').value.trim();
  if(!name) return;
  localStorage.setItem('kphonics_name', name);
  showGreeting(name);
}
function showGreeting(name){
  const btn = document.getElementById('confirmBtn');
  btn.textContent = '✓';
  btn.classList.add('saved');
  const g = greetings[Math.floor(Math.random()*greetings.length)];
  document.getElementById('greeting').textContent = `${g} ${name}!`;
}

window.addEventListener('load', ()=>{
  renderMenus();
  const saved = localStorage.getItem('kphonics_name');
  if(saved){
    document.getElementById('nameInput').value = saved;
    showGreeting(saved);
  }
  const score = parseInt(localStorage.getItem('kphonics_stage2_pct')||'40');
  document.getElementById('stage2bar').style.width = score+'%';
  document.getElementById('stage2pct').textContent = score+'%';
});

document.getElementById('nameInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') saveName();
});
</script>
</body>
</html>
